<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden</title>
  <style>
    :root {
      --bg: #f4f1eb;
      --text: #2a2a2a;
      --green: #3d6b32;
      --green-hover: #2e5226;
      --green-light: #aab3a3;
      --border: #c4b99a;
      --ground: #dde8cc;
      --path-col: #ccc1a6;
      --panel: #ffffff;
      --unknown: #8e8e8e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 2rem;
      color: var(--green);
      font-weight: normal;
      letter-spacing: 0.06em;
    }

    header p {
      color: #8a7f6e;
      font-style: italic;
      margin-top: 0.3rem;
      font-size: 0.95rem;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.5rem 1rem;
    }

    .tab-btn {
      padding: 0.55rem 1.75rem;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      border-radius: 3px;
      cursor: pointer;
      color: var(--text);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { background: var(--green-light); }

    .tab-btn.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .layout {
      display: flex;
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
      align-items: flex-start;
    }

    .garden-view {
      display: none;
      flex: 1;
      min-width: 0;
    }

    .garden-view.active { display: block; }

    .map-wrap {
      background: var(--ground);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .map-wrap svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .map-hint {
      text-align: center;
      font-size: 0.8rem;
      color: #a09585;
      font-style: italic;
      margin-top: 0.6rem;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: 268px;
      flex-shrink: 0;
      position: sticky;
      top: 1rem;
    }

    .info-card {
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      min-height: 180px;
    }

    .info-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      color: #b0a898;
      font-style: italic;
      font-size: 0.9rem;
      text-align: center;
      padding: 1rem;
    }

    .plant-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }

    .badge {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .plant-name {
      font-size: 1.1rem;
      font-weight: normal;
      line-height: 1.3;
    }

    .plant-name.is-unknown { color: #888; font-style: italic; }

    .names-block {
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }

    .name-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
      font-size: 0.88rem;
    }

    .lang {
      font-size: 0.68rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      color: #9a9080;
      min-width: 22px;
    }

    .name-it { font-style: italic; }
    .name-none { color: #bbb; }

    .meta-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9a9080;
      margin-bottom: 0.2rem;
    }

    .meta-val {
      font-size: 0.88rem;
      color: #5a5550;
      line-height: 1.55;
      margin-bottom: 0.85rem;
    }

    .unknown-note {
      background: #f7f4ed;
      border-left: 3px solid var(--border);
      border-radius: 3px;
      padding: 0.6rem 0.75rem;
      font-size: 0.82rem;
      color: #8a8070;
      line-height: 1.4;
    }

    /* ── Legend ──────────────────────────────────── */
    .legend {
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
    }

    .legend-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9a9080;
      margin-bottom: 0.75rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.3rem;
      cursor: pointer;
      border-radius: 3px;
      font-size: 0.88rem;
      transition: background 0.15s;
    }

    .legend-item:hover { background: var(--green-light); }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── SVG interactivity ───────────────────────── */
    .pm {
      cursor: pointer;
      transition: filter 0.18s;
    }

    .pm:hover { filter: brightness(0.88); }

    .pm.lit {
      filter: drop-shadow(0 0 7px rgba(50,90,40,0.75)) brightness(0.88);
    }
  </style>
</head>

  let curGarden = 'front';

  function switchTab(garden, btn) {
    curGarden = garden;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.garden-view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + garden).classList.add('active');
    clearInfo();
    buildLegend(garden);
  }

  function pick(garden, id) {
    document.querySelectorAll('.pm').forEach(el => el.classList.remove('lit'));
    document.querySelectorAll(`.pm[data-g="${garden}"][data-id="${id}"]`)
            .forEach(el => el.classList.add('lit'));
    renderCard(garden, id);
  }

  function renderCard(garden, id) {
    const p = DATA[garden][id];
    const plStr = p.pl ? `<span class="name-it">${p.pl}</span>`
                       : `<span class="name-none">not identified yet</span>`;
    const seStr = p.se ? `<span class="name-it">${p.se}</span>`
                       : `<span class="name-none">not identified yet</span>`;
    const enStr = p.unknown ? `<span class="name-none">—</span>` : p.name;

    const unknownBlock = p.unknown
      ? `<div class="unknown-note">This plant has not been identified yet.<br>Its name will be updated once known.</div>`
      : '';

    document.getElementById('info-card').innerHTML = `
      <div class="plant-header">
        <div class="badge" style="background:${p.unknown ? '#8e8e8e' : p.color}">${id}</div>
        <div class="plant-name${p.unknown ? ' is-unknown' : ''}">${p.name}</div>
      </div>
      <div class="names-block">
        <div class="name-row"><span class="lang">EN</span>${enStr}</div>
        <div class="name-row"><span class="lang">PL</span>${plStr}</div>
        <div class="name-row"><span class="lang">SE</span>${seStr}</div>
      </div>
      <div class="meta-label">Type</div>
      <div class="meta-val">${p.type}</div>
      <div class="meta-label">Notes</div>
      <div class="meta-val">${p.desc}</div>
      ${unknownBlock}
    `;
  }

  function clearInfo() {
    document.querySelectorAll('.pm').forEach(el => el.classList.remove('lit'));
    document.getElementById('info-card').innerHTML =
      `<div class="info-empty">Click on a plant<br>to see its details</div>`;
  }

  function buildLegend(garden) {
    const seen = new Set();
    let html = `<div class="legend-title">Legend</div>`;
    for (const [id, p] of Object.entries(DATA[garden])) {
      const key = id + p.name;          // each numbered entry appears once
      if (!seen.has(key)) {
        seen.add(key);
        html += `
          <div class="legend-item" onclick="pick('${garden}',${id})">
            <div class="legend-dot"
                 style="background:${p.color};opacity:${p.unknown?0.65:1}"></div>
            <span>${id}. ${p.name}</span>
          </div>`;
      }
    }
    document.getElementById('legend').innerHTML = html;
  }

  // Boot
  buildLegend('front');
</script>
