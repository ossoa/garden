<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>My Garden</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('front',this)">Front Garden</button>
  <button class="tab-btn"        onclick="switchTab('back',this)">Back Garden</button>
</div>

<div class="layout">

  <!-- ══ FRONT GARDEN MAP ══════════════════════════════════════════ -->
  <div class="garden-view active" id="view-front">
    <div class="map-wrap">
      <svg viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="ivy-hatch" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(40)">
            <line x1="0" y1="0" x2="0" y2="9" stroke="#2a5225" stroke-width="2.2" stroke-opacity="0.45"/>
          </pattern>
        </defs>

        <!-- Ground -->
        <rect width="780" height="300" fill="#dde8cc"/>

        <!-- Entrance / path gap -->
        <rect x="291" y="0" width="198" height="300" fill="#ccc1a6"/>
        <text x="390" y="158" text-anchor="middle" font-size="10" fill="#a09080"
              font-style="italic" transform="rotate(-90,390,158)">entrance</text>

        <!-- Left section background -->
        <rect x="8" y="8" width="275" height="284" rx="5"
              fill="#cde0bb" stroke="#afc898" stroke-width="1.5"/>

        <!-- 1 · English Ivy strip -->
        <g class="pm" data-g="front" data-id="1" onclick="pick('front',1)">
          <rect x="16" y="16" width="259" height="74" rx="3"
                fill="#3a6b30" fill-opacity="0.72"/>
          <rect x="16" y="16" width="259" height="74" rx="3"
                fill="url(#ivy-hatch)" fill-opacity="0.35"/>
          <text x="146" y="58" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none">1</text>
        </g>

        <!-- 2 · Hydrangea (left) -->
        <g class="pm" data-g="front" data-id="2" onclick="pick('front',2)">
          <ellipse cx="80" cy="190" rx="55" ry="49"
                   fill="#6b5f9a" fill-opacity="0.72"/>
          <text x="80" y="195" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none">2</text>
        </g>

        <!-- 2 · Hydrangea (right) -->
        <g class="pm" data-g="front" data-id="2" onclick="pick('front',2)">
          <ellipse cx="211" cy="190" rx="55" ry="49"
                   fill="#6b5f9a" fill-opacity="0.72"/>
          <text x="211" y="195" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none">2</text>
        </g>

        <!-- Right section background -->
        <rect x="497" y="8" width="275" height="284" rx="5"
              fill="#cde0bb" stroke="#afc898" stroke-width="1.5"/>

        <!-- 4 · Rhododendron (left) -->
        <g class="pm" data-g="front" data-id="4" onclick="pick('front',4)">
          <circle cx="547" cy="158" r="44" fill="#a83228" fill-opacity="0.78"/>
          <text x="547" y="163" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none">4</text>
        </g>

        <!-- 3 · Saucer Magnolia -->
        <g class="pm" data-g="front" data-id="3" onclick="pick('front',3)">
          <circle cx="635" cy="158" r="52" fill="#c785a8" fill-opacity="0.8"/>
          <text x="635" y="163" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none">3</text>
        </g>

        <!-- 4 · Rhododendron (right) -->
        <g class="pm" data-g="front" data-id="4" onclick="pick('front',4)">
          <circle cx="722" cy="158" r="42" fill="#a83228" fill-opacity="0.78"/>
          <text x="722" y="163" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none">4</text>
        </g>

        <!-- Direction label -->
        <text x="390" y="292" text-anchor="middle" font-size="10"
              fill="#909080" font-style="italic">↓ street</text>
      </svg>
    </div>
    <p class="map-hint">Click on a plant to see its details</p>
  </div>

  <!-- ══ BACK GARDEN MAP ═══════════════════════════════════════════ -->

    <div class="map-wrap">
      <svg viewBox="0 0 530 690" xmlns="http://www.w3.org/2000/svg">

        <!-- Ground -->
        <rect width="530" height="690" fill="#dde8cc"/>

        <!-- Main boundary (garden area above terrace) -->
        <rect x="8" y="8" width="514" height="554" rx="5"
              fill="#cde0bb" stroke="#afc898" stroke-width="1.5"/>

        <!-- ── LEFT BORDER · Plant 5 (green hedge) ── -->
        <g class="pm" data-g="back" data-id="5" onclick="pick('back',5)">
          <rect x="8" y="8" width="54" height="550" rx="4" fill="#4a7a3a"/>
          <!-- Hedge texture -->
          <ellipse cx="25" cy="40" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="45" cy="70" rx="16" ry="20" fill="#4e8040"/>
          <ellipse cx="28" cy="110" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="42" cy="150" rx="17" ry="21" fill="#4e8040"/>
          <ellipse cx="25" cy="190" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="45" cy="230" rx="16" ry="20" fill="#4e8040"/>
          <ellipse cx="28" cy="270" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="42" cy="310" rx="17" ry="21" fill="#4e8040"/>
          <ellipse cx="25" cy="350" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="45" cy="390" rx="16" ry="20" fill="#4e8040"/>
          <ellipse cx="28" cy="430" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="42" cy="470" rx="17" ry="21" fill="#4e8040"/>
          <ellipse cx="30" cy="520" rx="18" ry="22" fill="#5a8a4a"/>
          <text x="35" y="276" text-anchor="middle" font-size="15"
                font-weight="bold" fill="white" pointer-events="none">5</text>
        </g>

        <!-- ── RIGHT BORDER · Plant 5 (green hedge) ── -->
        <g class="pm" data-g="back" data-id="5" onclick="pick('back',5)">
          <rect x="468" y="8" width="54" height="550" rx="4" fill="#4a7a3a"/>
          <!-- Hedge texture -->
          <ellipse cx="505" cy="40" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="485" cy="70" rx="16" ry="20" fill="#4e8040"/>
          <ellipse cx="502" cy="110" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="488" cy="150" rx="17" ry="21" fill="#4e8040"/>
          <ellipse cx="505" cy="190" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="485" cy="230" rx="16" ry="20" fill="#4e8040"/>
          <ellipse cx="502" cy="270" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="488" cy="310" rx="17" ry="21" fill="#4e8040"/>
          <ellipse cx="505" cy="350" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="485" cy="390" rx="16" ry="20" fill="#4e8040"/>
          <ellipse cx="502" cy="430" rx="18" ry="22" fill="#5a8a4a"/>
          <ellipse cx="488" cy="470" rx="17" ry="21" fill="#4e8040"/>
          <ellipse cx="500" cy="520" rx="18" ry="22" fill="#5a8a4a"/>
          <text x="495" y="276" text-anchor="middle" font-size="15"
                font-weight="bold" fill="white" pointer-events="none">5</text>
        </g>

        <!-- ── TOP · Plant 8 · three clumps (unknown with yellow flowers) ── -->
        <!-- clump A -->
        <g class="pm" data-g="back" data-id="8" onclick="pick('back',8)">
          <ellipse cx="230" cy="100" rx="50" ry="26" fill="#5a8a4a"/>
          <circle cx="215" cy="92" r="4" fill="#f0d020"/>
          <circle cx="230" cy="88" r="4.5" fill="#f5d830"/>
          <circle cx="245" cy="92" r="4" fill="#f0d020"/>
          <circle cx="222" cy="98" r="3.5" fill="#f5d830"/>
          <circle cx="238" cy="97" r="3.5" fill="#f0d020"/>
          <text x="230" y="105" text-anchor="middle" font-size="13"
                font-weight="bold" fill="white" pointer-events="none">8</text>
        </g>
        <!-- clump B -->
        <g class="pm" data-g="back" data-id="8" onclick="pick('back',8)">
          <ellipse cx="325" cy="100" rx="50" ry="26" fill="#5a8a4a"/>
          <circle cx="310" cy="92" r="4" fill="#f0d020"/>
          <circle cx="325" cy="88" r="4.5" fill="#f5d830"/>
          <circle cx="340" cy="92" r="4" fill="#f0d020"/>
          <circle cx="317" cy="98" r="3.5" fill="#f5d830"/>
          <circle cx="333" cy="97" r="3.5" fill="#f0d020"/>
          <text x="325" y="105" text-anchor="middle" font-size="13"
                font-weight="bold" fill="white" pointer-events="none">8</text>
        </g>
        <!-- clump C -->
        <g class="pm" data-g="back" data-id="8" onclick="pick('back',8)">
          <ellipse cx="420" cy="100" rx="50" ry="26" fill="#5a8a4a"/>
          <circle cx="405" cy="92" r="4" fill="#f0d020"/>
          <circle cx="420" cy="88" r="4.5" fill="#f5d830"/>
          <circle cx="435" cy="92" r="4" fill="#f0d020"/>
          <circle cx="412" cy="98" r="3.5" fill="#f5d830"/>
          <circle cx="428" cy="97" r="3.5" fill="#f0d020"/>
          <text x="420" y="105" text-anchor="middle" font-size="13"
                font-weight="bold" fill="white" pointer-events="none">8</text>
        </g>

        <!-- ── 7 · Redcurrant Bush ── -->
        <g class="pm" data-g="back" data-id="7" onclick="pick('back',7)">
          <!-- Bush foliage -->
          <ellipse cx="355" cy="200" rx="28" ry="25" fill="#5a8a4a"/>
          <ellipse cx="375" cy="185" rx="25" ry="22" fill="#5a8a4a"/>
          <ellipse cx="365" cy="210" rx="30" ry="22" fill="#5a8a4a"/>
          <ellipse cx="380" cy="200" rx="22" ry="20" fill="#5a8a4a"/>
          <!-- Red berry clusters -->
          <circle cx="350" cy="195" r="4" fill="#c41818"/>
          <circle cx="355" cy="200" r="3.5" fill="#d42020"/>
          <circle cx="348" cy="202" r="3" fill="#c41818"/>
          <circle cx="370" cy="182" r="4" fill="#d42020"/>
          <circle cx="375" cy="188" r="3.5" fill="#c41818"/>
          <circle cx="367" cy="187" r="3" fill="#d42020"/>
          <circle cx="380" cy="195" r="4" fill="#c41818"/>
          <circle cx="385" cy="200" r="3.5" fill="#d42020"/>
          <circle cx="378" cy="202" r="3" fill="#c41818"/>
          <circle cx="360" cy="212" r="3.5" fill="#d42020"/>
          <circle cx="365" cy="218" r="4" fill="#c41818"/>
          <circle cx="372" cy="215" r="3" fill="#d42020"/>
          <text x="365" y="203" text-anchor="middle" font-size="14"
                font-weight="bold" fill="white" pointer-events="none">7</text>
        </g>

        <!-- ── 6 · Black Elder ── -->
        <g class="pm" data-g="back" data-id="6" onclick="pick('back',6)">
          <!-- Bush foliage -->
          <ellipse cx="410" cy="205" rx="32" ry="28" fill="#4a7040"/>
          <ellipse cx="430" cy="190" rx="28" ry="25" fill="#4a7040"/>
          <ellipse cx="420" cy="215" rx="30" ry="24" fill="#4a7040"/>
          <ellipse cx="438" cy="205" rx="25" ry="22" fill="#4a7040"/>
          <ellipse cx="405" cy="188" rx="22" ry="20" fill="#4a7040"/>
          <!-- White flower umbels (flat-topped clusters) -->
          <ellipse cx="408" cy="185" rx="10" ry="6" fill="#f5f5f0"/>
          <circle cx="405" cy="184" r="2.5" fill="white"/>
          <circle cx="408" cy="182" r="2" fill="white"/>
          <circle cx="411" cy="184" r="2.5" fill="white"/>
          <circle cx="407" cy="187" r="2" fill="white"/>
          <circle cx="410" cy="186" r="2" fill="white"/>
          <ellipse cx="432" cy="188" rx="11" ry="7" fill="#f5f5f0"/>
          <circle cx="429" cy="186" r="2.5" fill="white"/>
          <circle cx="432" cy="184" r="2" fill="white"/>
          <circle cx="435" cy="186" r="2.5" fill="white"/>
          <circle cx="430" cy="189" r="2" fill="white"/>
          <circle cx="434" cy="189" r="2" fill="white"/>
          <ellipse cx="420" cy="200" rx="12" ry="7" fill="#f5f5f0"/>
          <circle cx="416" cy="199" r="2.5" fill="white"/>
          <circle cx="420" cy="197" r="2" fill="white"/>
          <circle cx="424" cy="199" r="2.5" fill="white"/>
          <circle cx="418" cy="202" r="2" fill="white"/>
          <circle cx="422" cy="201" r="2" fill="white"/>
          <ellipse cx="440" cy="208" rx="9" ry="5" fill="#f5f5f0"/>
          <circle cx="437" cy="207" r="2" fill="white"/>
          <circle cx="440" cy="206" r="2" fill="white"/>
          <circle cx="443" cy="207" r="2" fill="white"/>
          <text x="420" y="220" text-anchor="middle" font-size="14"
                font-weight="bold" fill="white" pointer-events="none">6</text>
        </g>

        <!-- ── 2 · Schersmin / Mock Orange ── -->
        <g class="pm" data-g="back" data-id="2" onclick="pick('back',2)">
          <!-- Cloud-like bush shape -->
          <ellipse cx="370" cy="510" rx="40" ry="35" fill="#7a9a5a"/>
          <ellipse cx="400" cy="480" rx="45" ry="38" fill="#7a9a5a"/>
          <ellipse cx="435" cy="505" rx="38" ry="32" fill="#7a9a5a"/>
          <ellipse cx="400" cy="520" rx="50" ry="35" fill="#7a9a5a"/>
          <ellipse cx="365" cy="490" rx="30" ry="28" fill="#7a9a5a"/>
          <ellipse cx="430" cy="485" rx="32" ry="28" fill="#7a9a5a"/>
          <!-- White flowers -->
          <circle cx="375" cy="485" r="5" fill="white" fill-opacity="0.95"/>
          <circle cx="390" cy="470" r="4" fill="white" fill-opacity="0.9"/>
          <circle cx="410" cy="475" r="5" fill="white" fill-opacity="0.95"/>
          <circle cx="425" cy="482" r="4" fill="white" fill-opacity="0.9"/>
          <circle cx="440" cy="495" r="5" fill="white" fill-opacity="0.9"/>
          <circle cx="360" cy="505" r="4" fill="white" fill-opacity="0.9"/>
          <circle cx="385" cy="510" r="5" fill="white" fill-opacity="0.95"/>
          <circle cx="415" cy="515" r="4" fill="white" fill-opacity="0.9"/>
          <circle cx="435" cy="520" r="5" fill="white" fill-opacity="0.9"/>
          <circle cx="400" cy="490" r="5" fill="white" fill-opacity="0.95"/>
          <circle cx="445" cy="508" r="4" fill="white" fill-opacity="0.85"/>
          <circle cx="355" cy="520" r="4" fill="white" fill-opacity="0.85"/>
          <circle cx="368" cy="475" r="4" fill="white" fill-opacity="0.9"/>
          <circle cx="350" cy="495" r="4" fill="white" fill-opacity="0.85"/>
          <circle cx="420" cy="530" r="4" fill="white" fill-opacity="0.85"/>
          <circle cx="380" cy="525" r="5" fill="white" fill-opacity="0.9"/>
          <circle cx="450" cy="515" r="4" fill="white" fill-opacity="0.85"/>
          <circle cx="395" cy="535" r="4" fill="white" fill-opacity="0.85"/>
          <circle cx="345" cy="515" r="3" fill="white" fill-opacity="0.8"/>
          <circle cx="455" cy="500" r="3" fill="white" fill-opacity="0.8"/>
          <text x="400" y="505" text-anchor="middle" font-size="16"
                font-weight="bold" fill="#2a3a20" pointer-events="none">2</text>
        </g>

        <!-- Terrace -->
        <rect x="0" y="570" width="530" height="120" rx="0"
              fill="#ccc1a6" fill-opacity="0.92"/>
        <text x="265" y="588" text-anchor="middle" font-size="10"
              fill="#9a9080" font-style="italic">terrace</text>

        <!-- 4 · plant 4 pot along left edge of terrace -->
        <g class="pm" data-g="back" data-id="4" onclick="pick('back',4)">
          <rect x="0" y="580" width="27" height="100" rx="4"
                fill="#8e8e8e" fill-opacity="0.72"/>
          <text x="13" y="635" text-anchor="middle" font-size="14"
                font-weight="bold" fill="white" pointer-events="none"
                transform="rotate(-90,13,635)">4</text>
        </g>

        <!-- 3 · Boxwood hedge pot next to plant 4 -->
        <g class="pm" data-g="back" data-id="3" onclick="pick('back',3)">
          <rect x="30" y="580" width="40" height="100" rx="4"
                fill="#4e7a3a" fill-opacity="0.82"/>
          <text x="50" y="635" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none"
                transform="rotate(-90,50,635)">3</text>
        </g>

        <!-- 1 · English Ivy pot along right edge of terrace -->
        <g class="pm" data-g="back" data-id="1" onclick="pick('back',1)">
          <rect x="476" y="580" width="54" height="100" rx="4"
                fill="#3a6b30" fill-opacity="0.82"/>
          <text x="503" y="635" text-anchor="middle" font-size="16"
                font-weight="bold" fill="white" pointer-events="none"
                transform="rotate(90,503,635)">1</text>
        </g>

        <!-- House label -->
        <text x="265" y="685" text-anchor="middle" font-size="10"
              fill="#807060" font-style="italic">← house →</text>
      </svg>
    </div>
    <p class="map-hint">Click on a plant to see its details</p>
  </div>

  <!-- ══ SIDEBAR ════════════════════════════════════════════════════ -->
  <div class="sidebar">
    <div class="info-card" id="info-card">
      <div class="info-empty">Click on a plant<br>to see its details</div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

</div><!-- /layout -->

<script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
